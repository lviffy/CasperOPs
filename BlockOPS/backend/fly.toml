# fly.toml for BlockOps backend
app = "blockops-backend"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  CASPER_RPC_URL = "https://rpc.testnet.casper.live/rpc"
  CSPR_CLOUD_API_URL = "https://api.testnet.cspr.cloud"
  CASPER_CHAIN_NAME = "casper-test"

[experimental]
  auto_rollback = true

[[services]]
  http_checks = []
  internal_port = 3000
  processes = ["app"]
  protocol = "tcp"
  script_checks = []

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "15s"
    interval = "30s"
    restart_limit = 3
    timeout = "5s"
    type = "tcp"
